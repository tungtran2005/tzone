<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white border rounded p-6">
    <h1 class="text-2xl font-bold">Register</h1>
    <form id="register-form" class="mt-5 space-y-4">
      <div>
        <label class="block text-sm mb-1" for="email">Email</label>
        <input id="email" type="email" required class="w-full border rounded px-3 py-2" />
      </div>
      <div>
        <label class="block text-sm mb-1" for="password">Password</label>
        <input id="password" type="password" required minlength="6" class="w-full border rounded px-3 py-2" />
      </div>
      <button class="w-full bg-green-600 text-white rounded py-2" type="submit">Register</button>
    </form>
    <p id="register-message"></p>
    <p class="text-sm mt-3">Already have an account? <a class="text-blue-600" href="/login">Login</a></p>
    <p class="text-sm mt-2"><a class="text-blue-600" href="/">Back Home</a></p>
  </div>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/pages/register.js"></script>
</body>
</html>
