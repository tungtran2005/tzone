<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TZone Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold">TZone</h1>
      <nav class="space-x-4 text-sm">
        <a class="text-blue-600" href="/">Home</a>
        <a class="text-blue-600" href="/brands">Brands</a>
        <a class="text-blue-600" href="/login">Login</a>
        <a class="text-blue-600" href="/register">Register</a>
        <a class="text-blue-600" href="/admin">Admin</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-10">
    <div class="bg-white rounded-lg border p-8">
      <h2 class="text-3xl font-bold">Welcome to TZone</h2>
      <p class="mt-3 text-gray-600">Browse brands and devices, or manage data from the admin area.</p>
      <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-4">
        <a href="/brands" class="block border rounded p-4 hover:border-blue-500">
          <h3 class="font-semibold">All Brands</h3>
          <p class="text-sm text-gray-600 mt-1">See all brands and open each brand page.</p>
        </a>
        <a href="/login" class="block border rounded p-4 hover:border-blue-500">
          <h3 class="font-semibold">Login</h3>
          <p class="text-sm text-gray-600 mt-1">Sign in to access admin pages.</p>
        </a>
        <a href="/admin" class="block border rounded p-4 hover:border-blue-500">
          <h3 class="font-semibold">Admin Dashboard</h3>
          <p class="text-sm text-gray-600 mt-1">Manage brands and devices with CRUD tools.</p>
        </a>
      </div>
    </div>
  </main>
</body>
</html>
