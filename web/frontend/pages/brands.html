<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Brands</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white border-b">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold">All Brands</h1>
      <nav class="space-x-4 text-sm">
        <a class="text-blue-600" href="/">Home</a>
        <a class="text-blue-600" href="/admin">Admin</a>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <p id="page-message"></p>
    <div id="brand-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <div class="mt-6 flex items-center gap-3">
      <button id="prev-btn" class="px-4 py-2 rounded bg-gray-200 disabled:opacity-50" type="button">Previous</button>
      <span id="pagination-info" class="text-sm text-gray-600"></span>
      <button id="next-btn" class="px-4 py-2 rounded bg-gray-200 disabled:opacity-50" type="button">Next</button>
    </div>
  </main>

  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/pages/brands.js"></script>
</body>
</html>
