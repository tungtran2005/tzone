services:
  postgres:
    image: postgres:17-alpine
    container_name: tzone-postgres
    environment:
      POSTGRES_DB: tzone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tzone"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mongo:
    image: mongo:8.0
    container_name: tzone-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'quit(db.runCommand({ ping: 1 }).ok === 1 ? 0 : 1)'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mongo-seed:
    build:
      context: .
      dockerfile: docker/mongo-seed/Dockerfile
    container_name: tzone-mongo-seed
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: Cluster0
      MONGO_COLLECTION: brands
      SEED_FILE: /data/phone.json
    volumes:
      - ./phone.json:/data/phone.json:ro
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tzone-api
    environment:
      SERVER_PORT: 8080
      MONGODB_URL: mongodb://mongo:27017/?directConnection=true
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/tzone?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_API_RPM: "120"
      RATE_LIMIT_API_BURST: "30"
      RATE_LIMIT_AUTH_RPM: "20"
      RATE_LIMIT_AUTH_BURST: "5"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongo-seed:
        condition: service_completed_successfully
    volumes:
      - ./uploads:/app/uploads

  fe:
    build:
      context: ./fe
    container_name: tzone-fe
    environment:
      VITE_API_PROXY_TARGET: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  mongo_data:


