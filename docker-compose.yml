services:
  postgres:
    image: postgres:17-alpine
    container_name: tzone-postgres
    environment:
      POSTGRES_DB: tzone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tzone"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mongo:
    image: mongo:8.0
    container_name: tzone-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'quit(db.runCommand({ ping: 1 }).ok === 1 ? 0 : 1)'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: tzone-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mongo-seed:
    build:
      context: .
      dockerfile: docker/mongo-seed/Dockerfile
    container_name: tzone-mongo-seed
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: Cluster0
      MONGO_COLLECTION: brands
      SEED_FILE: /data/phoneExample.json
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-http://localhost:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-tzone-assets}
    volumes:
      - ./phoneExample.json:/data/phoneExample.json:ro
    depends_on:
      mongo:
        condition: service_healthy
      minio-media-seed:
        condition: service_completed_successfully
    restart: "no"

  minio:
    image: minio/minio:latest
    container_name: tzone-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: tzone-minio-init
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-tzone-assets}
    entrypoint: >
      /bin/sh -c "
      until mc alias set tzone http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 1; done;
      mc mb -p tzone/$${MINIO_BUCKET} || true;
      mc anonymous set download tzone/$${MINIO_BUCKET};
      "
    restart: "no"

  minio-media-seed:
    image: minio/mc:latest
    container_name: tzone-minio-media-seed
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-tzone-assets}
    volumes:
      - ./media:/media:ro
    entrypoint: >
      /bin/sh -c "
      mc alias set tzone http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mirror --overwrite /media tzone/$${MINIO_BUCKET}/media;
      "
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: tzone-api
    environment:
      SERVER_PORT: 8080
      MONGODB_URL: mongodb://mongo:27017/?directConnection=true
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/tzone?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      AI_PHONE_DATA_PATH: /app/phoneExample.json
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-tzone-assets}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-http://localhost:9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_API_RPM: "120"
      RATE_LIMIT_API_BURST: "30"
      RATE_LIMIT_AUTH_RPM: "20"
      RATE_LIMIT_AUTH_BURST: "5"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mongo-seed:
        condition: service_completed_successfully

  fe:
    build:
      context: ./fe
    container_name: tzone-fe
    environment:
      VITE_API_PROXY_TARGET: http://api:8080
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  mongo_data:
  minio_data:


